name: Gitleaks

on:
  pull_request:
    branches-ignore:
      - main
  push:
  workflow_dispatch:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Run the open-source CLI via Docker (no license needed)
      - name: Run Gitleaks OSS
        run: |
          docker run --rm \
            -v "${{ github.workspace }}":/repo \
            -w /repo \
            zricethezav/gitleaks:latest \
            detect --source . --redact --exit-code 1