<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Forgot Password — Scrutinise</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="/static/vendor/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/login.css" rel="stylesheet">
  </head>
  <body>
    <div class="auth-shell">
      <div class="auth-card">
        <div class="auth-left">
          <div class="logo-wrapper">
            <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='56' height='56' viewBox='0 0 66 66'><g fill='none' stroke='%23E8913A' stroke-width='5'><circle cx='28' cy='28' r='18'/><line x1='41' y1='41' x2='62' y2='62' stroke-linecap='round'/></g></svg>"
                 alt="Scrutinise Logo">
          </div>
          <div class="brand-logo">
            <img src="{{ url_for('static', filename='agora-logo.png') }}" alt="Agora Consulting" class="brand-logo-img">
          </div>
          <div class="tagline">Transaction Analysis System</div>
        </div>

        <div class="auth-right">
          <div class="login-box">
            <h3>Reset Password</h3>
            <div class="subcopy">Enter your username and we'll send a reset link to your registered email address.</div>

            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <div class="alert alert-warning">{{ messages[0] }}</div>
              {% endif %}
            {% endwith %}

            <form method="POST">
              <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
              <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username" required autofocus>
              </div>
              <div class="d-grid mb-3">
                <button type="submit" class="btn btn-login">Send Reset Link</button>
              </div>
            </form>
            <div class="text-center">
              <a href="{{ url_for('login') }}">Back to Sign In</a>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="/static/vendor/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
