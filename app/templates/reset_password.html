<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Set New Password — Scrutinise</title>
    <link href="/static/vendor/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/login.css" rel="stylesheet">
  </head>
  <body>
    <div class="auth-shell">
      <div class="auth-card">
        <div class="auth-left">
          <div class="logo-wrapper">
            <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='56' height='56' viewBox='0 0 66 66'><g fill='none' stroke='%23ff6a00' stroke-width='5'><circle cx='28' cy='28' r='18'/><line x1='41' y1='41' x2='62' y2='62' stroke-linecap='round'/></g></svg>"
                 alt="Scrutinise Logo">
          </div>
          <div class="brand-logo">
            <img src="{{ url_for('static', filename='scrutinise-txn-logo.png') }}" alt="Scrutinise TXN" class="brand-logo-img">
          </div>
          <div class="tagline">Transaction Analysis System</div>
        </div>

        <div class="auth-right">
          <div class="login-box">
            <h3>Set New Password</h3>
            <div class="subcopy">Choose a new password for your account.</div>

            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <div class="alert alert-warning">{{ messages[0] }}</div>
              {% endif %}
            {% endwith %}

            <form method="POST">
              <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
              <div class="mb-3">
                <label for="password" class="form-label">New Password</label>
                <input type="password" class="form-control" id="password" name="password" required autofocus>
              </div>
              <div class="mb-3">
                <label for="confirm_password" class="form-label">Confirm Password</label>
                <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
              </div>
              <div class="text-muted small mb-3">
                <strong>Requirements:</strong> Min 10 characters, uppercase, lowercase, number, and special character.
              </div>
              <div class="d-grid">
                <button type="submit" class="btn btn-login">Set Password</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
    <script src="/static/vendor/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
